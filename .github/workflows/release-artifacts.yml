name: Release artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.0
        required: true
        default: 1.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch }}
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build Windows artifacts
        shell: pwsh
        run: ./scripts/build_windows.ps1 -Arch ${{ matrix.arch }} -AppVersion "${{ github.event.inputs.version || github.ref_name }}"
      - uses: actions/upload-artifact@v7
        with:
          name: TelegramMessageCleaner-windows-${{ matrix.arch }}
          path: |
            release/TelegramMessageCleaner-windows-${{ matrix.arch }}-portable.zip
            release/windows-${{ matrix.arch }}-installer/*.exe

  macos-arm:
    name: macOS ARM
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Build macOS ARM artifacts
        run: APP_VERSION="${{ github.event.inputs.version || github.ref_name }}" ./scripts/build_macos_arm.sh
      - uses: actions/upload-artifact@v7
        with:
          name: TelegramMessageCleaner-macos-arm64
          path: |
            release/TelegramMessageCleaner-macos-arm64.dmg
            release/TelegramMessageCleaner-macos-arm64-app.zip

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [windows, macos-arm]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**
